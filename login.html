<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - إنجاز</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e40af 100%); 
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white rounded-[2.5rem] shadow-2xl p-10 w-full max-w-md border border-white/20">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-black text-blue-900 mb-2">مرحباً بك مجدداً</h2>
            <p class="text-slate-500 font-medium">سجل دخولك لمتابعة إنجازاتك في منصة إنجاز</p>
        </div>

        <form class="space-y-5" onsubmit="event.preventDefault(); alert('سيتم ربط نظام الدخول الحقيقي قريباً');">
            <div>
                <label class="block text-right text-sm font-bold text-slate-700 mb-2 mr-1">البريد الإلكتروني</label>
                <input type="email" placeholder="example@mail.com" required class="w-full px-5 py-4 rounded-2xl border border-slate-100 bg-slate-50 focus:bg-white focus:border-blue-500 outline-none transition-all shadow-sm">
            </div>
            <div>
                <label class="block text-right text-sm font-bold text-slate-700 mb-2 mr-1">كلمة المرور</label>
                <input type="password" placeholder="••••••••" required class="w-full px-5 py-4 rounded-2xl border border-slate-100 bg-slate-50 focus:bg-white focus:border-blue-500 outline-none transition-all shadow-sm">
            </div>
            
            <button type="submit" class="w-full bg-blue-700 text-white py-4 rounded-2xl font-black text-lg hover:bg-blue-800 transition-all shadow-xl shadow-blue-100 mt-6">
                تسجيل الدخول
            </button>
        </form>

        <p class="text-center mt-10 text-slate-500 font-medium">
            ليس لديك حساب؟ 
            <a href="register.html" class="text-blue-700 font-black hover:underline">أنشئ حسابك الآن</a>
        </p>
        
        <div class="text-center mt-6 border-t border-slate-100 pt-6">
            <a href="index.html" class="text-slate-400 text-sm hover:text-blue-600 transition-colors font-bold">← العودة للصفحة الرئيسية</a>
        </div>
    </div>
</body>
</html>

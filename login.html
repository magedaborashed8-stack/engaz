<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - إنجاز</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center px-6">
    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden">
        <div class="bg-blue-700 p-8 text-center text-white">
            <a href="index.html" class="text-3xl font-black block mb-2 text-white">إنجاز</a>
            <p class="font-bold opacity-80">تسجيل الدخول (نسخة تجريبية)</p>
        </div>
        <div class="p-10 space-y-6 text-right">
            <input type="email" placeholder="البريد الإلكتروني" disabled class="w-full p-4 rounded-2xl border-2 border-slate-50 bg-slate-50 opacity-60 font-bold text-left outline-none">
            <input type="password" placeholder="كلمة المرور" disabled class="w-full p-4 rounded-2xl border-2 border-slate-50 bg-slate-50 opacity-60 font-bold text-left outline-none">
            <button onclick="alert('شكرًا لاهتمامك! سيتم تفعيل نظام تسجيل الدخول الحقيقي قريباً. يمكنك حالياً تصفح لوحة التحكم كمعاينة.'); window.location.href='dashboard.html';" 
                class="block w-full bg-blue-700 text-white text-center py-4 rounded-2xl font-black text-lg hover:bg-blue-800 transition shadow-lg">
                تسجيل الدخول (قريباً)
            </button>
            <p class="text-center text-slate-500 font-bold">ليس لديك حساب؟ <a href="register.html" class="text-blue-700 underline">أنشئ حساباً</a></p>
        </div>
    </div>
</body>
</html>

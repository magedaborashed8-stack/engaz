<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - إنجاز</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md">
        <h2 class="text-3xl font-black text-center text-blue-900 mb-8">تسجيل الدخول</h2>
        
        <div class="space-y-3 mb-8">
            <button class="w-full flex items-center justify-center gap-3 border-2 border-slate-100 py-3 rounded-xl hover:bg-slate-50 transition font-bold text-slate-700">
                <img src="https://www.google.com/favicon.ico" class="w-5 h-5">
                المتابعة باستخدام جوجل
            </button>
            <button class="w-full flex items-center justify-center gap-3 bg-[#1877F2] text-white py-3 rounded-xl hover:opacity-90 transition font-bold">
                <span>f</span>
                المتابعة باستخدام فيسبوك
            </button>
        </div>

        <div class="relative flex items-center mb-8">
            <div class="flex-grow border-t border-slate-200"></div>
            <span class="px-4 text-slate-400 text-sm">أو بالإيميل</span>
            <div class="flex-grow border-t border-slate-200"></div>
        </div>

        <form class="space-y-4">
            <input type="email" placeholder="البريد الإلكتروني" class="w-full px-5 py-3 rounded-xl border border-slate-200 focus:border-blue-500 outline-none">
            <input type="password" placeholder="كلمة المرور" class="w-full px-5 py-3 rounded-xl border border-slate-200 focus:border-blue-500 outline-none">
            <button class="w-full bg-blue-700 text-white py-4 rounded-xl font-black text-lg hover:bg-blue-800 transition shadow-lg shadow-blue-100">دخول</button>
        </form>

        <p class="text-center mt-8 text-slate-500">
            ليس لديك حساب؟ 
            <a href="#" class="text-blue-700 font-bold hover:underline">اشترك الآن</a>
        </p>
        <div class="text-center mt-4">
            <a href="index.html" class="text-slate-400 text-sm hover:text-slate-600">العودة للرئيسية</a>
        </div>
    </div>
</body>
</html>

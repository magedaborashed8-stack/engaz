<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - إنجاز</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e40af 100%); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white rounded-[2.5rem] shadow-2xl p-10 w-full max-w-md border border-white/20">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-black text-blue-900 mb-2">مرحباً بك مجدداً</h2>
            <p class="text-slate-500 font-medium">سجل دخولك لمتابعة إنجازاتك</p>
        </div>
        
        <div class="space-y-4 mb-8">
            <button type="button" class="w-full flex items-center justify-center gap-3 border-2 border-slate-100 py-3.5 rounded-2xl hover:bg-slate-50 transition-all duration-300 font-bold text-slate-700">
                <img src="https://www.google.com/favicon.ico" class="w-5 h-5">
                المتابعة باستخدام جوجل
            </button>
            <button type="button" class="w-full flex items-center justify-center gap-3 bg-[#1877F2] text-white py-3.5 rounded-2xl hover:opacity-90 transition-all duration-300 font-bold shadow-lg shadow-blue-200">
                <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                المتابعة باستخدام فيسبوك
            </button>
        </div>

        <div class="relative flex items-center mb-8">
            <div class="flex-grow border-t border-slate-100"></div>
            <span class="px-4 text-slate-400 text-xs font-bold uppercase tracking-widest">أو عبر البريد</span>
            <div class="flex-grow border-t border-slate-100"></div>
        </div>

        <form class="space-y-4" onsubmit="event.preventDefault(); alert('هذا النموذج للعرض فقط حالياً');">
            <div>
                <label class="block text-right text-sm font-bold text-slate-700 mb-2 mr-1">البريد الإلكتروني</label>
                <input type="email" placeholder="name@company.com" class="w-full px-5 py-4 rounded-2xl border border-slate-100 bg-slate-50 focus:bg-white focus:border-blue-500 outline-none transition-all">
            </div>
            <div>
                <label class="block text-right text-sm font-bold text-slate-700 mb-2 mr-1">كلمة المرور</label>
                <input type="password" placeholder="••••••••" class="w-full px-5 py-4 rounded-2xl border border-slate-100 bg-slate-50 focus:bg-white focus:border-blue-500 outline-none transition-all">
            </div>
            
            <button type="submit" class="w-full bg-blue-700 text-white py-4 rounded-2xl font-black text-lg hover:bg-blue-800 transition-all shadow-xl shadow-blue-100 mt-4">
                تسجيل الدخول
            </button>
        </form>

        <p class="text-center mt-10 text-slate-500 font-medium">
            ليس لديك حساب؟ 
            <a href="index.html" class="text-blue-700 font-black hover:underline">أنشئ حسابك الآن</a>
        </p>
        
        <div class="text-center mt-6">
            <a href="index.html" class="text-slate-400 text-sm hover:text-blue-600 transition-colors font-bold">← العودة للرئيسية</a>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنجاز - منصة المبدعين الأحرار</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; scroll-behavior: smooth; }
        .hero-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e40af 100%); }
        .hidden-section { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <nav class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-50 border-b border-slate-100 font-bold">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center text-right">
            <a href="index.html" class="text-3xl font-black text-blue-700 tracking-tighter">إنجاز</a>
            <div class="hidden md:flex space-x-reverse space-x-8">
                <a href="index.html" class="text-blue-700">الرئيسية</a>
                <a href="projects.html" class="text-slate-600 hover:text-blue-600 transition">تصفح الفرص</a>
                <button onclick="showSection('how-it-works')" class="text-slate-600 hover:text-blue-600 transition">كيفية العمل</button>
                <button onclick="showSection('pricing')" class="text-slate-600 hover:text-blue-600 transition font-bold">الباقات</button>
            </div>
            <div class="flex items-center space-x-reverse space-x-4">
                <a href="login.html" class="text-slate-600 hover:text-blue-600 transition font-bold">دخول</a>
                <a href="register.html" class="bg-blue-700 text-white px-7 py-2.5 rounded-full font-bold hover:bg-blue-800 transition shadow-lg shadow-blue-200">ابدأ الآن</a>
            </div>
        </div>
    </nav>

    <main id="main-content">
        <section id="home">
            <div class="hero-gradient text-white py-28 px-6 text-center">
                <div class="max-w-4xl mx-auto">
                    <h1 class="text-5xl md:text-7xl font-black mb-8 leading-tight tracking-tighter">أنجز مشاريعك <br>بسهولة وأمان</h1>
                    <div class="flex flex-col sm:flex-row justify-center gap-6">
                        <a href="projects.html" class="bg-white text-blue-900 px-12 py-5 rounded-2xl font-black text-xl hover:bg-slate-100 transition shadow-2xl inline-block text-center">ابحث عن عمل</a>
                        <button onclick="showSection('add-project')" class="bg-blue-600 text-white px-12 py-5 rounded-2xl font-black text-xl hover:bg-blue-500 border border-blue-400 transition">أضف مشروعك</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="add-project" class="hidden-section py-20 px-6 max-w-4xl mx-auto text-right">
             <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-100">
                <h2 class="text-3xl font-black mb-8 text-blue-900 border-r-8 border-blue-600 pr-4">انشر مشروعك الجديد</h2>
                <form onsubmit="event.preventDefault(); alert('سيتم تفعيل النشر قريباً!'); showSection('home');" class="space-y-6">
                    <input type="text" placeholder="عنوان المشروع" class="w-full p-4 rounded-xl border-2 border-slate-100 outline-none focus:border-blue-500">
                    <button type="submit" class="w-full bg-blue-700 text-white py-5 rounded-2xl font-black text-xl hover:bg-blue-800 transition shadow-lg">انشر المشروع الآن</button>
                    <button type="button" onclick="showSection('home')" class="w-full text-slate-400 font-bold mt-4">إلغاء</button>
                </form>
            </div>
        </section>

        <section id="how-it-works" class="hidden-section py-20 px-6 max-w-7xl mx-auto text-center">
            <h2 class="text-4xl font-black text-blue-900 mb-10">كيف يعمل إنجاز؟</h2>
            <p class="text-slate-500 font-bold">1. أضف مشروعك - 2. استقبل العروض - 3. وظف الخبير.</p>
            <button onclick="showSection('home')" class="mt-8 text-blue-600 font-black">عودة للرئيسية</button>
        </section>
    </main>

    <script>
        function showSection(sectionId) {
            const sections = ['home', 'how-it-works', 'pricing', 'add-project'];
            sections.forEach(s => {
                const el = document.getElementById(s);
                if (el) el.style.display = 'none';
            });
            document.getElementById(sectionId).style.display = 'block';
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>

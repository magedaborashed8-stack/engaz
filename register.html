<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - إنجاز</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-blue-900 min-h-screen flex items-center justify-center p-6">
    <div class="bg-white rounded-[2.5rem] p-10 w-full max-w-md shadow-2xl text-right">
        <h2 class="text-3xl font-black text-blue-900 mb-6 font-bold text-center font-bold">انضم إلى إنجاز</h2>
        <form class="space-y-4" onsubmit="event.preventDefault(); alert('نظام التسجيل تحت التجهيز حالياً، سيتم إطلاقه الأسبوع القادم!');">
            <input type="text" placeholder="الاسم الكامل" required class="w-full p-4 rounded-xl border border-slate-100 bg-slate-50 outline-none focus:border-blue-500 font-bold">
            <input type="email" placeholder="البريد الإلكتروني" required class="w-full p-4 rounded-xl border border-slate-100 bg-slate-50 outline-none focus:border-blue-500 font-bold">
            <button type="submit" class="w-full bg-blue-700 text-white py-4 rounded-2xl font-black text-lg shadow-lg">إنشاء الحساب</button>
        </form>
        <p class="text-center mt-6 font-bold text-slate-500">لديك حساب؟ <a href="login.html" class="text-blue-700 underline">دخول</a></p>
    </div>
</body>
</html>

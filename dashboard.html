<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - إنجاز</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .sidebar-link:hover { background: #f1f5f9; color: #1e40af; }
    </style>
</head>
<body class="bg-slate-50 flex">

    <aside class="w-64 bg-white h-screen sticky top-0 border-l border-slate-200 hidden md:flex flex-col p-6">
        <div class="text-3xl font-black text-blue-700 mb-10 tracking-tighter">إنجاز</div>
        
        <nav class="space-y-2 flex-1">
            <a href="#" class="sidebar-link flex items-center gap-3 p-4 rounded-xl text-blue-700 bg-blue-50 font-bold">
                <span>🏠</span> الرئيسية
            </a>
            <a href="projects.html" class="sidebar-link flex items-center gap-3 p-4 rounded-xl text-slate-600 font-bold transition">
                <span>📁</span> مشاريعي
            </a>
            <a href="profile.html" class="sidebar-link flex items-center gap-3 p-4 rounded-xl text-slate-600 font-bold transition">
                <span>👤</span> ملفي الشخصي
            </a>
            <a href="#" class="sidebar-link flex items-center gap-3 p-4 rounded-xl text-slate-600 font-bold transition">
                <span>🔔</span> الإشعارات
            </a>
        </nav>

        <a href="index.html" class="mt-auto flex items-center gap-3 p-4 text-red-500 font-bold hover:bg-red-50 rounded-xl transition">
            <span>🚪</span> خروج
        </a>
    </aside>

    <main class="flex-1 p-4 md:p-10">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-black text-slate-800">مرحباً بك، أحمد!</h1>
            <div class="flex items-center gap-4">
                <div class="text-left hidden md:block">
                    <p class="font-black text-sm text-slate-800">أحمد المحترف</p>
                    <p class="text-xs text-slate-400 font-bold">مستقل موثق</p>
                </div>
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-black shadow-lg">أ</div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                <p class="text-slate-400 font-bold text-sm mb-1">الرصيد الكلي</p>
                <h3 class="text-3xl font-black text-blue-700">$1,250</h3>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                <p class="text-slate-400 font-bold text-sm mb-1">عروض اليوم</p>
                <h3 class="text-3xl font-black text-slate-800">1 / 2</h3>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                <p class="text-slate-400 font-bold text-sm mb-1">مشاريع قيد التنفيذ</p>
                <h3 class="text-3xl font-black text-green-600">3</h3>
            </div>
        </div>

        <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
            <h3 class="font-black text-xl mb-6 text-slate-800">آخر النشاطات</h3>
            <div class="space-y-6">
                <div class="flex items-center justify-between border-b border-slate-50 pb-4">
                    <div class="flex items-center gap-4 text-right">
                        <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center">💼</div>
                        <div>
                            <p class="font-bold text-slate-800 text-sm">تم قبول عرضك على مشروع "تصميم متجر"</p>
                            <p class="text-xs text-slate-400">منذ 3 ساعات</p>
                        </div>
                    </div>
                    <span class="text-xs font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-lg">تحديث</span>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
